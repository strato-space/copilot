<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
html { background: #0E1A2B; }
body {
  width: 720pt;
  height: 405pt;
  margin: 0;
  padding: 0;
  display: flex;
  background: #0E1A2B;
  font-family: 'Trebuchet MS', Arial, sans-serif;
  color: #F4F7FB;
}
.canvas {
  width: 100%;
  height: 100%;
  padding: 34pt;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.kicker {
  margin: 0;
  color: #1FB8A6;
  font-size: 15pt;
  font-weight: 700;
  letter-spacing: 0.5pt;
  text-transform: uppercase;
}
.title {
  margin: 10pt 0 8pt 0;
  font-size: 38pt;
  line-height: 1.08;
  font-weight: 700;
  max-width: 88%;
}
.subtitle {
  margin: 0;
  font-size: 15pt;
  color: #C8D2DF;
}
.strip {
  margin-top: 14pt;
  display: flex;
  gap: 10pt;
}
.badge {
  padding: 7pt 11pt;
  border-radius: 8pt;
  background: #18263A;
  border-left: 5pt solid #FF6A3D;
}
.badge p {
  margin: 0;
  font-size: 11.5pt;
  color: #E8EEF8;
}
.footer {
  margin: 0;
  font-size: 11pt;
  color: #8EA1BA;
}
</style>
</head>
<body>
  <div class="canvas">
    <div>
      <p class="kicker">Strato Space / Copilot</p>
      <h1 class="title">Единая операционная платформа для роста маржи и скорости решений</h1>
      <p class="subtitle">Marketing Discovery Deck • PMO • 03.03.2026</p>
      <div class="strip">
        <div class="badge"><p>FinOps</p></div>
        <div class="badge"><p>OperOps/CRM</p></div>
        <div class="badge"><p>Voice Workflow</p></div>
      </div>
    </div>
    <p class="footer">Цель презентации: согласовать позиционирование Copilot и рамку discovery-пилота.</p>
  </div>
</body>
</html>
